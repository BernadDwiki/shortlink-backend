version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: shortlink
      POSTGRES_PASSWORD: shortlinkpassword
      POSTGRES_DB: shortlink
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    networks:
      - shortlink-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: "8080"
      JWT_SECRET: supersecretjwtkey
      JWT_EXPIRATION_MINUTES: "30"
      DB_URL: postgres://shortlink:shortlinkpassword@db:5432/shortlink?sslmode=disable
      BASE_URL: http://localhost:8080
    networks:
      - shortlink-net

  frontend:
    build:
      context: ../shortlink-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - shortlink-net

volumes:
  db_data:

networks:
  shortlink-net:
    driver: bridge
